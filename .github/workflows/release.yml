# ─────────────────────────────────────────────────────────────────────────────
#  FluxBot Release Pipeline
#
#  Wird ausgelöst wenn ein Git-Tag mit "v" beginnt, z.B.:
#    git tag v1.0.0
#    git push origin v1.0.0
#
#  Was dieser Workflow tut:
#    1. Baut Binaries für Windows, Linux und macOS (amd64 + arm64)
#    2. Baut das Docker-Image und pusht es auf ghcr.io
#    3. Erstellt einen GitHub Release mit Changelog + Downloads
# ─────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write        # GitHub Release erstellen & Assets hochladen
  packages: write        # Docker-Image auf ghcr.io pushen

jobs:
  # ── 1. Binaries bauen & Release erstellen ───────────────────────────────────
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Vollständige Git-History für Changelog

      - name: Go einrichten
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Version aus Tag auslesen
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # ── Changelog generieren ─────────────────────────────────────────────────
      - name: Letzten Tag auslesen
        id: last_tag
        run: |
          # Sortiere Tags nach Version (absteigend) und nimm den VORHERIGEN Tag (nicht den aktuellen)
          LAST_TAG=$(git tag -l --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          echo "Aktueller Tag: ${GITHUB_REF_NAME}, Letzter Tag: $LAST_TAG"

      - name: Changelog generieren
        id: changelog
        env:
          CURRENT_TAG: ${{ steps.version.outputs.VERSION }}
          LAST_TAG: ${{ steps.last_tag.outputs.tag }}
        run: |
          # Delimiter für Multiline Output
          EOF=$(openssl rand -hex 8)

          # Changelog erzeugen und in GITHUB_OUTPUT schreiben
          echo "changelog<<$EOF" >> $GITHUB_OUTPUT

          if [ -z "$LAST_TAG" ]; then
            echo "### 📝 Changelog" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "🎉 **Erstes Release - alle Features!**" >> $GITHUB_OUTPUT
          else
            echo "### 📝 Changelog" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "Commits seit **$LAST_TAG**:" >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT

            # Features gruppieren (Shell-Filter statt Git-Grep)
            FEATURES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%an)" 2>/dev/null | grep "^- feat:" || true)
            if [ -n "$FEATURES" ]; then
              echo "**✨ Features:**" >> $GITHUB_OUTPUT
              echo "$FEATURES" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            fi

            # Bugfixes gruppieren (Shell-Filter statt Git-Grep)
            BUGFIXES=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%an)" 2>/dev/null | grep "^- fix:" || true)
            if [ -n "$BUGFIXES" ]; then
              echo "**🐛 Bugfixes:**" >> $GITHUB_OUTPUT
              echo "$BUGFIXES" >> $GITHUB_OUTPUT
              echo "" >> $GITHUB_OUTPUT
            fi

            # Andere Commits (alles außer feat: und fix:)
            echo "**📋 Weitere Änderungen:**" >> $GITHUB_OUTPUT
            git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%an)" 2>/dev/null | grep -v "^- feat:\|^- fix:" | head -20 >> $GITHUB_OUTPUT || echo "- Siehe Commit-Historie" >> $GITHUB_OUTPUT
          fi

          echo "$EOF" >> $GITHUB_OUTPUT

          # Debug: Ausgabe anzeigen
          echo "=== Generated Changelog ===" && tail -50 $GITHUB_OUTPUT

      # ── Binaries cross-kompilieren ─────────────────────────────────────────
      - name: Binaries bauen
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p dist

          echo "→ Windows amd64"
          GOOS=windows GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${VERSION} -H windowsgui" \
            -o dist/fluxbot-windows-amd64.exe ./cmd/fluxbot/

          echo "→ Linux amd64"
          GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/fluxbot-linux-amd64 ./cmd/fluxbot/

          echo "→ Linux arm64 (Raspberry Pi / ARM-Server)"
          GOOS=linux GOARCH=arm64 \
            go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/fluxbot-linux-arm64 ./cmd/fluxbot/

          echo "→ macOS amd64 (Intel)"
          GOOS=darwin GOARCH=amd64 \
            go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/fluxbot-darwin-amd64 ./cmd/fluxbot/

          echo "→ macOS arm64 (Apple Silicon)"
          GOOS=darwin GOARCH=arm64 \
            go build -ldflags="-s -w -X main.version=${VERSION}" \
            -o dist/fluxbot-darwin-arm64 ./cmd/fluxbot/

          ls -lh dist/

      # ── Installer-Skripte mit ins dist-Verzeichnis kopieren ───────────────
      - name: Installer-Skripte hinzufügen
        run: |
          cp install.ps1 dist/install.ps1
          cp install.sh  dist/install.sh
          cp docker-compose.prod.yml dist/docker-compose.yml

      # ── Checksums generieren (für sicherheitsbewusste Nutzer) ─────────────
      - name: SHA256-Checksums generieren
        working-directory: dist
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # ── GitHub Release erstellen mit Changelog ─────────────────────────────
      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: "FluxBot ${{ steps.version.outputs.VERSION }}"
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ---

            ### 🚀 Installation

            **Windows – direkt starten (kein Docker):**
            Lade `fluxbot-windows-amd64.exe` herunter → Doppelklick → fertig.
            Der Einrichtungsassistent öffnet sich automatisch im Browser.

            **Windows – Docker (PowerShell):**
            ```powershell
            irm https://fluxbot.ki-werke.de/install.ps1 | iex
            ```

            **Linux / macOS – direkt starten:**
            ```bash
            chmod +x fluxbot-linux-amd64   # oder darwin-amd64 / darwin-arm64
            ./fluxbot-linux-amd64
            ```

            **Linux / macOS – Docker:**
            ```bash
            curl -fsSL https://fluxbot.ki-werke.de/install.sh | bash
            ```

            ---

            ### 📦 Download-Übersicht

            | Datei | Plattform |
            |---|---|
            | `fluxbot-windows-amd64.exe` | Windows (64-bit) |
            | `fluxbot-linux-amd64` | Linux (64-bit) |
            | `fluxbot-linux-arm64` | Linux ARM (Raspberry Pi, ARM-Server) |
            | `fluxbot-darwin-amd64` | macOS Intel |
            | `fluxbot-darwin-arm64` | macOS Apple Silicon (M1/M2/M3) |
            | `docker-compose.yml` | Docker Compose Konfiguration |
            | `install.ps1` | Windows Installer-Skript |
            | `install.sh` | Linux/macOS Installer-Skript |
            | `SHA256SUMS.txt` | Checksums zur Verifikation |

            ---

            Entwickelt von [KI-WERKE](https://ki-werke.de)
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Tags mit "-" (z.B. v1.0.0-beta) werden automatisch als Pre-Release markiert

  # ── 2. Docker-Image bauen & auf ghcr.io pushen ───────────────────────────
  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: release   # Erst wenn die Binaries erfolgreich gebaut wurden

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Version aus Tag auslesen
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Docker Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Bei GitHub Container Registry anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image-Tags berechnen:
      #   ghcr.io/ki-werke/fluxbot:v1.2.3
      #   ghcr.io/ki-werke/fluxbot:latest  (nur bei stabilen Releases, kein "-")
      - name: Docker-Image-Tags berechnen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fluxbot
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Docker-Image bauen & pushen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
