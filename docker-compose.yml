version: "3.8"

# FluxBot – Multi-Channel AI Agent
# Credentials: Bitte workspace/config.json ausfüllen (KEINE Credentials hier eintragen!)
# Kopiere workspace/config.example.json → workspace/config.json
# Umgebungsvariablen: .env-Datei (siehe .env.example)

services:

  # ── Tailscale VPN-Sidecar ──────────────────────────────────────────────────
  # Dashboard (Port 9090) ist NUR über das Tailscale-Netzwerk erreichbar.
  # Lokal: Tailscale auf dem Host installiert → http://localhost:9090 wie gewohnt.
  # VPS / Hetzner: Zugriff via http://fluxbot.DEIN-TAILNET.ts.net:9090
  # Auth-Key: https://login.tailscale.com/admin/settings/keys (Reusable + Ephemeral)
  tailscale:
    image: tailscale/tailscale:latest
    container_name: fluxbot_tailscale
    hostname: fluxbot
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTH_KEY:-}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_HOSTNAME=fluxbot
      - TS_ACCEPT_DNS=true
    volumes:
      - tailscale_state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    networks:
      - fluxnet
    restart: unless-stopped

  fluxbot:
    build: .
    container_name: fluxbot_ai
    # ── Vault-Schlüssel (AES-256-GCM) ─────────────────────────────────────────
    # Für VPS / Hetzner / Docker: FLUXBOT_VAULT_KEY setzen (32-Byte hex-String).
    # Den Wert erhältst du beim ersten lokalen Start aus der Ausgabe:
    #   [Vault] FLUXBOT_VAULT_KEY=<dein-key>
    # Lokal (ohne Docker): .vaultkey-Datei wird automatisch generiert.
    environment:
      - FLUXBOT_VAULT_KEY=${FLUXBOT_VAULT_KEY:-}
    ports:
      # Nur localhost – kein direkter Internetzugriff auf das Dashboard!
      # Zugriff via Tailscale oder lokal über http://localhost:9090
      - "127.0.0.1:9090:9090"
    volumes:
      # Workspace enthält config.json, Gedächtnis, Skills
      - ./workspace:/app/workspace
    networks:
      - fluxnet
    depends_on:
      - tailscale
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Lokale KI-Modelle via Ollama (optional – für Voice und lokale LLMs)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - fluxnet
    ports:
      - "11434:11434"
    restart: unless-stopped

  # WordPress Test-Umgebung (für KI-WERKE WordPress-Skills)
  wordpress:
    image: wordpress:latest
    container_name: wp_test_env
    ports:
      - "8080:80"
    volumes:
      - wp_data:/var/www/html
      - ./plugins:/var/www/html/wp-content/plugins
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wp_db
    networks:
      - fluxnet
    depends_on:
      - db
    restart: always

  db:
    image: mariadb:10.6
    container_name: wp_db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: wp_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
      MYSQL_ROOT_PASSWORD: root_password
    networks:
      - fluxnet
    restart: always

networks:
  fluxnet:
    driver: bridge

volumes:
  tailscale_state:   # Tailscale-Status (Gerät bleibt nach Neustart im Netz)
  ollama_data:
  wp_data:
  db_data:
